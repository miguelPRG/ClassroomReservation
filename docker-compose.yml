services:
  backend:
    build:
      context: ./backend
    container_name: app-backend
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app-frontend
    ports:
      - "127.0.0.1:8080:8080"
      - "0.0.0.0:80:8080"
    environment:
      - NODE_ENV=production
    restart: always
    depends_on:
      - backend
