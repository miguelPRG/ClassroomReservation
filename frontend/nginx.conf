events {
    # Define o número máximo de conexões simultâneas por worker process
    worker_connections 1024;
}

http {
    # Inclui tipos MIME padrão (extensões -> content-type)
    include /etc/nginx/mime.types;
    
    # Tipo padrão quando não encontra MIME type
    default_type application/octet-stream;

    server {
        # Escuta na porta 8080 (HTTP) em IPv4 e IPv6
        listen 8080;
        
        # Aceita qualquer hostname (wildcard)
        server_name _;
        
        # Diretório raiz dos ficheiros estáticos do frontend
        root /usr/share/nginx/html;
        
        # Ficheiro por omissão quando acede a diretório
        index index.html;

        # === CABEÇALHOS DE SEGURANÇA OWASP ===
        
        # Impede browser de "sniffar" MIME types (ex: js como txt)
        add_header X-Content-Type-Options "nosniff" always;
        
        # Bloqueia carregamento em iframes (proteção clickjacking)
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # Ativa filtro XSS do browser (modo bloqueio)
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Controla quando enviar HTTP Referrer (privacidade)
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # === PROXY PARA API BACKEND ===
        location /api/ {
            # 1. REWRITE: /api/room → /room (para o backend ver)
            rewrite ^/api/(.*) /$1 break;
            
            # 2. PROXY para backend na porta 8000
            proxy_pass http://app-backend:8000;
            
            # 3. CABEÇALHOS: mantém host original e info do cliente
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Cabeçalho custom para identificar que a requisição passou pelo proxy frontend
            proxy_set_header X-Internal-Proxy "app-frontend";
            
            # 3. REDIRECTS: corrige backend://room → localhost:8080/api/room
            proxy_redirect ~^http://[^/]+/(.*)$ /api/$1;
            proxy_redirect ~^https://[^/]+/(.*)$ /api/$1;
        }

        # === FRONTEND ESTÁTICO (SPA) ===
        location / {
            # Procura: 1º ficheiro exato, 2º diretório+index, 3º index.html (SPA)
            try_files $uri $uri/ /index.html;
        }

        # === SEGURANÇA - BLOQUEIA FICHEIROS OCULTOS ===
        location ~ /\. {
            # Bloqueia acesso a .git, .env, .htaccess, etc.
            deny all;
        }
    }
}