events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging melhorado
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'backend: $upstream_addr upstream_status: $upstream_status';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Headers de segurança

        # Protege contra ataques de MIME sniffing
        add_header X-Content-Type-Options "nosniff" always;
        # Protege contra clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;
        # Protege contra XSS (Cross-Site Scripting)
        add_header X-XSS-Protection "1; mode=block" always;
        # Define a política de referrer para "strict-origin-when-cross-origin"
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache para arquivos estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Sem cache para index.html
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location /api { 
            rewrite ^/api(/.*)$ $1 break;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://app-backend:8000; 
            
            # Reescrever redirects - remove protocolo/host e adiciona /api
            proxy_redirect ~^(https?://)?[^/]*(/.*)$ /api$2;
            
            # Cookies sem secure para HTTP (dev)
            proxy_cookie_flags ~ httponly samesite=lax;
        }

        # Bloqueia acesso a ficheiros ocultos
        location ~ /\. {
            deny all;
        }
    }
}
